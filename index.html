<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LC Cotizador Muebles</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0f172a;
      color:#fff;
      padding:20px
    }
    .container{
      max-width:1100px;
      margin:auto
    }
    .card{
      background:#111827;
      border:1px solid #334155;
      border-radius:18px;
      padding:20px;
      margin-bottom:20px
    }
    h1,h2{
      margin-top:0
    }
    .grid{
      display:grid;
      gap:16px
    }
    .grid-2{
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr))
    }
    input,select,button{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #475569;
      background:#0f172a;
      color:#fff;
      margin-top:6px;
      box-sizing:border-box;
    }
    button{
      background:#f59e0b;
      color:#111827;
      font-weight:bold;
      cursor:pointer
    }
    .piece-row{
      display:grid;
      grid-template-columns:2fr 1fr 1fr 1fr auto;
      gap:8px;
      margin-bottom:10px
    }
    .result{
      font-size:1.2rem;
      font-weight:bold
    }
    .logo{
      display:block;
      margin:0 auto 20px auto;
      max-width:180px;
      border-radius:18px;
      border:1px solid #334155
    }
    .small{
      font-size:0.9rem;
      color:#cbd5e1
    }
    @media(max-width:700px){
      .piece-row{
        grid-template-columns:1fr 1fr
      }
      .piece-row button{
        grid-column:span 2
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="IMG-20260213-WA0055.jpg" alt="Logo" class="logo">

    <h1>LC Cotizador Muebles</h1>
    <p class="small">Cotiza muebles en melamina y MDF desde cualquier dispositivo.</p>

    <div class="card grid grid-2">
      <div>
        <label>Cliente
          <input id="clientName" placeholder="Ej: Juan Pérez">
        </label>
      </div>
      <div>
        <label>Proyecto
          <input id="projectName" placeholder="Ej: Closet dormitorio">
        </label>
      </div>
    </div>

    <div class="card">
      <h2>Piezas</h2>
      <p class="small">Ingresa cada pieza del mueble con sus medidas en milímetros.</p>
      <div id="pieces"></div>
      <button onclick="addPiece()">+ Agregar pieza</button>
    </div>

    <div class="card grid grid-2">
      <div>
        <label>Material
          <select id="materialType" onchange="setMaterialPrice()">
            <option value="58">Melamina Blanca 15mm</option>
            <option value="65" selected>Melamina Blanca 18mm</option>
            <option value="72">Melamina Nogal 18mm</option>
            <option value="52">MDF Crudo 15mm</option>
            <option value="68">MDF RH 18mm</option>
          </select>
        </label>
      </div>

      <div>
        <label>Precio tablero ($)
          <input id="boardPrice" type="number" value="65">
        </label>
      </div>

      <div>
        <label>Ancho tablero (mm)
          <input id="boardW" type="number" value="2440">
        </label>
      </div>

      <div>
        <label>Alto tablero (mm)
          <input id="boardH" type="number" value="1830">
        </label>
      </div>

      <div>
        <label>Desperdicio (%)
          <input id="wastePct" type="number" value="10">
        </label>
      </div>

      <div>
        <label>Tapacanto ($/m)
          <input id="edgeBand" type="number" value="12">
        </label>
      </div>

      <div>
        <label>Herrajes ($)
          <input id="hardware" type="number" value="25">
        </label>
      </div>

      <div>
        <label>Mano de obra ($)
          <input id="labor" type="number" value="60">
        </label>
      </div>

      <div>
        <label>Transporte ($)
          <input id="transport" type="number" value="15">
        </label>
      </div>

      <div>
        <label>Ganancia (%)
          <input id="profitPct" type="number" value="35">
        </label>
      </div>
    </div>

    <div class="card">
      <h2>Resultados</h2>
      <p class="result" id="resultBoards">Tableros estimados: 0</p>
      <p class="result" id="resultArea">Área total: 0.00 m˛</p>
      <p class="result" id="resultCost">Costo total: $0.00</p>
      <p class="result" id="resultPrice">Precio sugerido: $0.00</p>

      <button onclick="calculate()">Calcular</button>
      <button onclick="window.print()" style="margin-top:10px">Guardar / Imprimir PDF</button>
    </div>
  </div>

<script>
let pieces = [
  {name:'Lateral', width:1800, height:500, qty:2},
  {name:'Base', width:800, height:500, qty:2},
  {name:'Puerta', width:1750, height:400, qty:2},
];

function renderPieces(){
  const container = document.getElementById('pieces');
  container.innerHTML='';

  pieces.forEach((p,i)=>{
    const row=document.createElement('div');
    row.className='piece-row';

    row.innerHTML=`
      <input value="${p.name}" onchange="pieces[${i}].name=this.value" placeholder="Nombre pieza">
      <input type="number" value="${p.width}" onchange="pieces[${i}].width=Number(this.value)" placeholder="Ancho">
      <input type="number" value="${p.height}" onchange="pieces[${i}].height=Number(this.value)" placeholder="Alto">
      <input type="number" value="${p.qty}" onchange="pieces[${i}].qty=Number(this.value)" placeholder="Cant.">
      <button onclick="removePiece(${i})">X</button>
    `;

    container.appendChild(row);
  });
}

function addPiece(){
  pieces.push({name:'',width:0,height:0,qty:1});
  renderPieces();
}

function removePiece(i){
  pieces.splice(i,1);
  renderPieces();
}

function setMaterialPrice(){
  document.getElementById('boardPrice').value = document.getElementById('materialType').value;
}

function calculate(){
  const boardW = +document.getElementById('boardW').value;
  const boardH = +document.getElementById('boardH').value;
  const boardPrice = +document.getElementById('boardPrice').value;
  const wastePct = +document.getElementById('wastePct').value;
  const edgeBand = +document.getElementById('edgeBand').value;
  const hardware = +document.getElementById('hardware').value;
  const labor = +document.getElementById('labor').value;
  const transport = +document.getElementById('transport').value;
  const profitPct = +document.getElementById('profitPct').value;

  const boardArea = (boardW * boardH) / 1000000;
  const totalArea = pieces.reduce((s,p)=>s+((p.width*p.height)/1000000)*p.qty,0);
  const totalPerimeter = pieces.reduce((s,p)=>s+(((p.width*2+p.height*2)/1000)*p.qty),0);

  const boards = Math.ceil(totalArea / boardArea);
  const boardCost = boards * boardPrice;
  const wasteCost = boardCost * (wastePct / 100);
  const edgeCost = totalPerimeter * edgeBand;

  const subtotal = boardCost + wasteCost + edgeCost + hardware + labor + transport;
  const finalPrice = subtotal * (1 + profitPct / 100);

  document.getElementById('resultBoards').innerText = Tableros estimados: ${boards};
  document.getElementById('resultArea').innerText = Área total: ${totalArea.toFixed(2)} m˛;
  document.getElementById('resultCost').innerText = Costo total: $${subtotal.toFixed(2)};
  document.getElementById('resultPrice').innerText = Precio sugerido: $${finalPrice.toFixed(2)};
}

renderPieces();
</script>
</body>
</html>
